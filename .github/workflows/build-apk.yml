name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o SmartReminderApp.zip

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install npm dependencies
        working-directory: SmartReminderApp
        run: npm install

      - name: Install TypeScript
        working-directory: SmartReminderApp
        run: npm install -D typescript

      - name: Sync Capacitor web assets
        working-directory: SmartReminderApp
        run: npx cap copy android

      - name: Grant execute permission to gradlew
        run: chmod +x SmartReminderApp/android/gradlew

      - name: Build debug APK
        working-directory: SmartReminderApp/android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: smart-reminder-debug-apk
          path: SmartReminderApp/android/app/build/outputs/apk/debug/app-debug.apk
